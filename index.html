<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femboy Hub - Link Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --primary: #8b5cf6;
            --primary-hover: #a78bfa;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a0033 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Auth */
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
            background: rgba(255,255,255,0.08);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--primary-hover));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        /* Link Creator */
        .link-creator {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 1rem;
            align-items: center;
            margin-bottom: 2rem;
        }

        .url-input {
            padding-right: 3rem !important;
        }

        .copy-btn {
            padding: 1rem 2rem !important;
            min-width: 120px;
        }

        /* Links Table */
        .links-table {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .table-header {
            background: rgba(139,92,246,0.2);
            padding: 1.5rem;
            font-weight: 600;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr 1fr 150px;
            gap: 1rem;
            align-items: center;
        }

        .link-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr 1fr 150px;
            gap: 1rem;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .link-row:hover {
            background: rgba(139,92,246,0.1);
        }

        .link-row:last-child {
            border-bottom: none;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-clicks { background: rgba(16,185,129,0.2); color: var(--success); }
        .badge-location { background: rgba(236,72,153,0.2); color: var(--accent); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
        }

        .close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .close:hover {
            color: var(--text);
        }

        .treeview {
            margin-top: 1rem;
        }

        .tree-item {
            padding: 0.75rem;
            border-left: 3px solid var(--primary);
            margin-left: 1rem;
            background: rgba(255,255,255,0.03);
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tree-item:hover {
            background: rgba(139,92,246,0.1);
            transform: translateX(5px);
        }

        .map-container {
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 1rem;
            background: var(--bg-secondary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .link-creator { grid-template-columns: 1fr; }
            .table-header, .link-row { 
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-container">
        <div class="glass fade-in">
            <div class="logo">
                <h1>Femboy Hub</h1>
                <p style="color: var(--text-muted);">Professional Link Tracking</p>
            </div>
            
            <div id="loginForm">
                <div class="input-group">
                    <i class="input-icon">👤</i>
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="input-icon">🔒</i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button class="btn btn-primary" onclick="login()">
                    <span>Login</span> ➤
                </button>
                <div style="text-align: center; margin-top: 1rem;">
                    <button class="btn btn-secondary" onclick="showRegister()">Create Account</button>
                </div>
            </div>

            <div id="registerForm" style="display: none;">
                <div class="input-group">
                    <i class="input-icon">👤</i>
                    <input type="text" id="regUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="input-icon">📧</i>
                    <input type="email" id="regEmail" placeholder="Email (optional)">
                </div>
                <div class="input-group">
                    <i class="input-icon">🔒</i>
                    <input type="password" id="regPassword" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <i class="input-icon">🔐</i>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
                </div>
                <button class="btn btn-primary" onclick="register()">
                    <span>Create Account</span> ➤
                </button>
                <div style="text-align: center; margin-top: 1rem;">
                    <button class="btn btn-secondary" onclick="showLogin()">Back to Login</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard container">
        <div class="glass" style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0;">Dashboard</h2>
                <button class="btn btn-secondary" onclick="logout()" style="padding: 0.75rem 1.5rem; min-width: auto;">
                    Logout
                </button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalLinks">0</div>
                    <div>Total Links</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalClicks">0</div>
                    <div>Total Clicks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="uniqueIPs">0</div>
                    <div>Unique IPs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="geolocated">0</div>
                    <div>Geolocated</div>
                </div>
            </div>
        </div>

        <div class="glass">
            <h3 style="margin-bottom: 1.5rem;">Create Short Link</h3>
            <div class="link-creator">
                <div class="input-group">
                    <input type="url" id="targetUrl" class="url-input" placeholder="https://example.com" required>
                </div>
                <button class="btn btn-primary copy-btn" onclick="createShortLink()">
                    <span>Shorten</span> ✨
                </button>
                <div id="shortLinkResult" style="display: none;">
                    <input type="text" id="shortLinkUrl" readonly>
                    <button class="btn btn-secondary copy-btn" onclick="copyShortLink()">Copy</button>
                </div>
            </div>
        </div>

        <div class="glass" style="margin-top: 2rem;">
            <div class="table-header">
                <span>ID</span>
                <span>Short URL</span>
                <span>Clicks</span>
                <span>Created</span>
                <span>Actions</span>
            </div>
            <div id="linksList"></div>
        </div>
    </div>

    <!-- Hit Details Modal -->
    <div id="hitModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Hit Details</h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
