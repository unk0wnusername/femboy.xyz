<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femboy Hub - Link Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .auth-form { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; max-width: 400px; margin: 50px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .dashboard { display: none; }
        .login-form, .register-form { display: none; }
        .active { display: block !important; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; }
        input { background: #f0f0f0; transition: all 0.3s; }
        input:focus { outline: none; background: white; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3); }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .toggle-auth { text-align: center; color: #666; cursor: pointer; text-decoration: underline; }
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .link-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .short-url { font-family: monospace; background: #e3f2fd; padding: 10px; border-radius: 8px; word-break: break-all; margin: 10px 0; cursor: pointer; }
        .stats { display: flex; gap: 10px; margin: 15px 0; }
        .stat { flex: 1; text-align: center; padding: 15px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border-radius: 10px; }
        .visitors { max-height: 400px; overflow-y: auto; background: #f8f9ff; border-radius: 10px; padding: 15px; }
        .visitor { padding: 10px; margin: 5px 0; background: white; border-radius: 8px; border-left: 4px solid #667eea; }
        .create-form { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; margin: 30px 0; }
        .qr-code { text-align: center; margin: 20px 0; }
        .hidden { display: none; }
        .tree-view { font-family: monospace; background: #1a1a2e; color: #00ff00; padding: 15px; border-radius: 10px; overflow-x: auto; }
        .error { background: #ff6b6b; color: white; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .success { background: #51cf66; color: white; padding: 15px; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Forms -->
        <div id="loginForm" class="auth-form login-form active">
            <h2>🔐 Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button onclick="login()">Login</button>
            <div class="toggle-auth" onclick="showRegister()">Don't have an account? Register</div>
        </div>

        <div id="registerForm" class="auth-form register-form">
            <h2>📝 Register</h2>
            <input type="text" id="regUsername" placeholder="Username" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <button onclick="register()">Register</button>
            <div class="toggle-auth" onclick="showLogin()">Already have an account? Login</div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <h1>🚀 Femboy Hub - Link Tracker</h1>
            <div class="create-form">
                <h3>Create Short Link</h3>
                <input type="text" id="targetUrl" placeholder="https://target.com" required>
                <button onclick="createShortLink()">🔗 Create Short Link</button>
                <div id="newLinkResult"></div>
            </div>
            
            <div id="linksGrid" class="links-grid"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
