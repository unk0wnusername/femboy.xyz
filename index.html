<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femboy Hub - Advanced Short Link Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .treeview-item { transition: all 0.3s ease; }
        .treeview-item:hover { transform: translateX(5px); }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-pink-900 to-purple-900 min-h-screen text-white">
    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center hidden">
        <div class="glass p-8 rounded-3xl max-w-md w-full mx-4 backdrop-blur-xl border border-white/20">
            <div class="flex justify-end mb-6">
                <button onclick="toggleAuth()" class="text-white hover:text-gray-200">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <div id="loginForm">
                <h2 class="text-3xl font-bold mb-8 text-center gradient-text bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    <i class="fas fa-lock"></i> Login
                </h2>
                <form id="loginFormSubmit">
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Email</label>
                        <input type="email" id="loginEmail" required class="w-full p-4 bg-white/10 border border-white/30 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/50 backdrop-blur-sm">
                    </div>
                    <div class="mb-8">
                        <label class="block text-sm font-semibold mb-2">Password</label>
                        <input type="password" id="loginPassword" required class="w-full p-4 bg-white/10 border border-white/30 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/50 backdrop-blur-sm">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 p-4 rounded-2xl font-bold text-lg hover:from-purple-600 hover:to-pink-600 transform hover:scale-105 transition-all duration-200">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                </form>
                <p class="text-center mt-6">
                    <button onclick="showRegister()" class="text-purple-300 hover:text-white underline">Need an account? Register</button>
                </p>
            </div>
            <div id="registerForm" class="hidden">
                <h2 class="text-3xl font-bold mb-8 text-center gradient-text bg-gradient-to-r from-green-400 to-blue-400 bg-clip-text text-transparent">
                    <i class="fas fa-user-plus"></i> Register
                </h2>
                <form id="registerFormSubmit">
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Username</label>
                        <input type="text" id="regUsername" required class="w-full p-4 bg-white/10 border border-white/30 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/50 backdrop-blur-sm">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Email</label>
                        <input type="email" id="regEmail" required class="w-full p-4 bg-white/10 border border-white/30 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/50 backdrop-blur-sm">
                    </div>
                    <div class="mb-8">
                        <label class="block text-sm font-semibold mb-2">Password</label>
                        <input type="password" id="regPassword" required minlength="8" class="w-full p-4 bg-white/10 border border-white/30 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/50 backdrop-blur-sm">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-blue-500 p-4 rounded-2xl font-bold text-lg hover:from-green-600 hover:to-blue-600 transform hover:scale-105 transition-all duration-200">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>
                </form>
                <p class="text-center mt-6">
                    <button onclick="showLogin()" class="text-purple-300 hover:text-white underline">Already have account? Login</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainContent" class="hidden min-h-screen">
        <!-- Header -->
        <header class="glass sticky top-0 z-40 backdrop-blur-xl border-b border-white/20">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <i class="fas fa-link text-3xl text-purple-400"></i>
                        <div>
                            <h1 class="text-2xl font-bold gradient-text bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Femboy Hub</h1>
                            <p class="text-sm text-purple-200">Advanced Short Link Service</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div id="userStats" class="text-sm text-right hidden">
                            <div id="statLinks" class="font-semibold">0 Links</div>
                            <div id="statClicks" class="text-purple-300">0 Clicks</div>
                        </div>
                        <button onclick="logout()" class="bg-red-500/80 hover:bg-red-500 px-6 py-2 rounded-xl font-semibold transition-all duration-200 hover:scale-105">
                            <i class="fas fa-sign-out-alt mr-2"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="grid lg:grid-cols-4 gap-8">
                <!-- Stats Cards -->
                <div class="lg:col-span-1 space-y-4">
                    <div class="grid grid-cols-2 lg:grid-cols-1 gap-4">
                        <div class="glass p-6 rounded-2xl border border-white/20">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-purple-300 text-sm">Total Links</p>
                                    <p id="totalLinks" class="text-3xl font-bold text-white">0</p>
                                </div>
                                <i class="fas fa-link text-4xl text-purple-400"></i>
                            </div>
                        </div>
                        <div class="glass p-6 rounded-2xl border border-white/20">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-pink-300 text-sm">Total Clicks</p>
                                    <p id="totalClicks" class="text-3xl font-bold text-white">0</p>
                                </div>
                                <i class="fas fa-mouse-pointer text-4xl text-pink-400"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Link Generator -->
                    <div class="glass p-6 rounded-2xl border border-white/20">
                        <h3 class="text-xl font-bold mb-6 flex items-center">
                            <i class="fas fa-magic mr-2 text-purple-400"></i>Create Link
                        </h3>
                        <div class="space-y-4">
                            <input id="customUrl" placeholder="https://example.com" class="w-full p-4 bg-white/10 border border-white/30 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/50">
                            <div class="flex space-x-2">
                                <input id="customAlias" placeholder="custom-alias" maxlength="20" class="flex-1 p-4 bg-white/10 border border-white/30 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/50">
                                <button onclick="generateLink()" class="bg-gradient-to-r from-purple-500 to-pink-500 px-6 py-4 rounded-xl font-bold hover:from-purple-600 hover:to-pink-600 transition-all duration-200 hover:scale-105">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                            <small class="text-purple-300">Leave alias blank for random generation</small>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="lg:col-span-3 space-y-8">
                    <!-- Tree View -->
                    <div class="glass p-8 rounded-3xl border border-white/20">
                        <h2 class="text-2xl font-bold mb-6 flex items-center">
                            <i class="fas fa-sitemap mr-3 text-green-400"></i>Your Links Tree
                        </h2>
                        <div id="treeView" class="space-y-2 max-h-96 overflow-y-auto"></div>
                    </div>

                    <!-- Analytics Chart -->
                    <div class="glass p-8 rounded-3xl border border-white/20">
                        <h2 class="text-2xl font-bold mb-6 flex items-center">
                            <i class="fas fa-chart-line mr-3 text-blue-400"></i>Analytics
                        </h2>
                        <canvas id="clicksChart" height="200"></canvas>
                    </div>

                    <!-- Recent Activity -->
                    <div class="glass p-8 rounded-3xl border border-white/20">
                        <h2 class="text-2xl font-bold mb-6 flex items-center">
                            <i class="fas fa-history mr-3 text-yellow-400"></i>Recent Clicks
                        </h2>
                        <div id="recentActivity" class="space-y-3 max-h-64 overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize everything
        let currentUser = null;
        let links = JSON.parse(localStorage.getItem('userLinks') || '[]');
        let clicksData = JSON.parse(localStorage.getItem('clicksData') || '[]');
        let chart = null;

        // Initialize auth state
        window.onload = function() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showDashboard();
                loadLinks();
                updateStats();
                initChart();
            } else {
                showAuth();
            }
        };

        // Auth functions
        function toggleAuth() {
            document.getElementById('authModal').classList.toggle('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        // Secure login/register with PBKDF2 hashing
        async function hashPassword(password) {
            const enc = new TextEncoder();
            const key = await crypto.subtle.importKey('raw', enc.encode(password), {name: 'PBKDF2'}, false, ['deriveBits']);
            const hash = await crypto.subtle.deriveBits({name: 'PBKDF2', salt: enc.encode('femboy-hub-salt-2026'), iterations: 100000, hash: 'SHA-256'}, key, 256);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('loginFormSubmit').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = await hashPassword(document.getElementById('loginPassword').value);
            
            // Simulate user lookup (in production, check against backend)
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                toggleAuth();
                showDashboard();
                loadLinks();
            } else {
                alert('Invalid credentials');
            }
        });

        document.getElementById('registerFormSubmit').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = await hashPassword(document.getElementById('regPassword').value);
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === email)) {
                alert('Email already registered');
                return;
            }
            
            const newUser = { id: crypto.randomUUID(), username, email, password, created: new Date().toISOString() };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            currentUser = newUser;
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            toggleAuth();
            showDashboard();
        });

        function showAuth() {
            document.getElementById('authModal').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userStats').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            links = [];
            showAuth();
        }

        // Link management
        function generateLink() {
            const customUrl = document.getElementById('customUrl').value;
            const customAlias = document.getElementById('customAlias').value.trim();
            
            if (!customUrl) {
                alert('Please enter a URL');
                return;
            }

            const alias = customAlias || Math.random().toString(36).substring(2, 8);
            const shortUrl = `${window.location.origin}/${alias}`;
            const link = {
                id: crypto.randomUUID(),
                alias,
                originalUrl: customUrl,
                shortUrl,
                clicks: 0,
                created: new Date().toISOString(),
                clickHistory: []
            };

            links.unshift(link);
            localStorage.setItem('userLinks', JSON.stringify(links));
            loadLinks();
            updateStats();
            document.getElementById('customUrl').value = '';
            document.getElementById('customAlias').value = '';
        }

        function loadLinks() {
            const treeView = document.getElementById('treeView');
            treeView.innerHTML = '';

            if (links.length === 0) {
                treeView.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-inbox text-4xl mb-4"></i><p>No links yet. Create your first one!</p></div>';
                return;
            }

            links.forEach(link => {
                const linkEl = document.createElement('div');
                linkEl.className = 'treeview-item group p-4 bg-white/5 rounded-2xl border border-white/20 hover:bg-white/10 transition-all duration-300 cursor-pointer';
                linkEl.onclick = () => copyLink(link.shortUrl);
                
                linkEl.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center space-x-3">
                            <i class="fas fa-link text-purple-400"></i>
                            <span class="font-mono font-bold text-lg">${link.alias}</span>
                        </div>
                        <div class="flex items-center space-x-4 text-sm">
                            <span class="bg-purple-500/30 px-3 py-1 rounded-full">${link.clicks} clicks</span>
                            <span class="text-gray-400">${new Date(link.created).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div class="text-xs text-gray-400 truncate">${link.originalUrl}</div>
                    <div id="clickPreview-${link.id}" class="mt-3 text-xs space-y-1 max-h-20 overflow-y-auto hidden"></div>
                `;
                
                treeView.appendChild(linkEl);
                loadClickPreview(link);
            });
        }

        function loadClickPreview(link) {
            const preview = document.getElementById(`clickPreview-${link.id}`);
            if (link.clickHistory.length > 0) {
                preview.classList.remove('hidden');
                preview.innerHTML = link.clickHistory.slice(0, 3).map(click => `
                    <div class="flex items-center justify-between p-2 bg-black/30 rounded-lg">
                        <span class="font-mono truncate flex-1 mr-4">${click.ip}</span>
                        <div class="text-right">
                            <div class="font-mono text-xs">${click.userAgent.slice(0, 30)}...</div>
                            <div class="text-xs text-gray-400">${new Date(click.timestamp).toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                // Visual feedback
                const original = event.target.innerText;
                event.target.innerText = 'Copied!';
                event.target.style.background = '#10b981';
                setTimeout(() => {
                    event.target.innerText = original;
                    event.target.style.background = '';
                }, 2000);
            });
        }

        // IP Geolocation & VPN Detection
        async function trackClick(alias) {
            try {
                const response = await fetch(`https://ipapi.co/json`);
                const ipData = await response.json();
                
                const isVPN = await detectVPN(ipData.ip);
                
                const clickData = {
                    ip: ipData.ip,
                    country: ipData.country_name,
                    city: ipData.city,
                    isp: ipData.org,
                    vpn: isVPN,
                    userAgent: navigator.userAgent,
                    timestamp: new Date().toISOString(),
                    referer: document.referrer
                };

                // Find and update link
                const link = links.find(l => l.alias === alias);
                if (link) {
                    link.clicks++;
                    link.clickHistory.unshift(clickData);
                    if (link.clickHistory.length > 50) link.clickHistory = link.clickHistory.slice(0, 50);
                    localStorage.setItem('userLinks', JSON.stringify(links));
                    clicksData.unshift(clickData);
                    if (clicksData.length > 1000) clicksData = clicksData.slice(0, 1000);
                    localStorage.setItem('clicksData', JSON.stringify(clicksData));
                    
                    updateStats();
                    loadLinks();
                    updateChart();
                }

                // Redirect to dashboard (tracking complete)
                window.location.href = window.location.origin;
                
            } catch (error) {
                console.error('Tracking failed:', error);
                window.location.href = window.location.origin;
            }
        }

        async function detectVPN(ip) {
            try {
                const response = await fetch(`https://ipqualityscore.com/api/json/ip/YOUR_API_KEY/${ip}`);
                const data = await response.json();
                return data.fraud_score > 75 || data.vpn || data.proxy || data.tor;
            } catch {
                return false;
            }
        }

        // Stats & Charts
        function updateStats() {
            document.getElementById('totalLinks').textContent = links.length;
            document.getElementById('totalClicks').textContent = links.reduce((sum, link) => sum + link.clicks, 0);
            document.getElementById('statLinks').textContent = `${currentUser.username}: ${links.length} links`;
            document.getElementById('statClicks').textContent = `${links.reduce((sum, link) => sum + link.clicks, 0)} clicks`;
        }

        function initChart() {
            const ctx = document.getElementById('clicksChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Clicks',
                        data: [],
                        borderColor: 'rgb(236, 72, 153)',
                        backgroundColor: 'rgba(236, 72, 153, 0.2)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } },
                    plugins: { legend: { display: false } }
                }
            });
            updateChart();
        }

        function updateChart() {
            if (!chart) return;
            
            const recentClicks = clicksData.slice(0, 30);
            chart.data.labels = recentClicks.map(c => new Date(c.timestamp).toLocaleTimeString());
            chart.data.datasets[0].data = recentClicks.map((_, i) => recentClicks.slice(0, i+1).length);
            chart.update('none');
        }

        // Global click tracker (for short URLs)
        function initClickTracker() {
            const path = window.location.pathname.slice(1);
            if (path && !currentUser) {
                trackClick(path);
            }
        }
        initClickTracker();

        // Prevent common attacks
        window.addEventListener('beforeunload', function(e) {
            // CSP would be handled by Cloudflare
        });

        // Service Worker for offline PWA (optional)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
