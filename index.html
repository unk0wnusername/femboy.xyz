<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femboy Hub - Link Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --accent: #ff6b9d;
            --accent-hover: #ff8ab9;
            --text-primary: #ffffff;
            --text-secondary: #b8b8d1;
            --border: #2a2a3e;
            --glass: rgba(255,255,255,0.05);
        }
        
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        
        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }
        
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.3);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[var(--bg-primary)] to-[var(--bg-secondary)] min-h-screen text-[var(--text-primary)] font-sans">
    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden fade-in">
        <div class="glass rounded-2xl p-8 w-full max-w-md transition-all">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-r from-[var(--accent)] to-[var(--accent-hover)] rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-link text-2xl text-black"></i>
                </div>
                <h2 class="text-2xl font-bold bg-gradient-to-r from-[var(--accent)] to-[var(--accent-hover)] bg-clip-text text-transparent mb-2">LinkHub</h2>
                <p class="text-[var(--text-secondary)]">Secure link tracking & analytics</p>
            </div>
            
            <form id="authForm" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text-secondary)]"></i>
                    <input type="text" id="username" placeholder="Username" class="w-full pl-12 pr-4 py-3 bg-[var(--bg-secondary)] border border-[var(--border)] rounded-xl text-white placeholder-[var(--text-secondary)] focus:outline-none focus:ring-2 focus:ring-[var(--accent)] transition-all">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text-secondary)]"></i>
                    <input type="password" id="password" placeholder="Password" class="w-full pl-12 pr-4 py-3 bg-[var(--bg-secondary)] border border-[var(--border)] rounded-xl text-white placeholder-[var(--text-secondary)] focus:outline-none focus:ring-2 focus:ring-[var(--accent)] transition-all">
                </div>
                <button type="submit" class="w-full btn-primary text-black font-bold py-3 px-6 rounded-xl uppercase tracking-wide text-sm transition-all">
                    <span id="authBtnText">Login</span>
                </button>
            </form>
            
            <div class="mt-6 pt-6 border-t border-[var(--border)] text-center">
                <button id="toggleAuth" class="text-[var(--accent)] hover:text-[var(--accent-hover)] font-medium transition-all">Switch to <span id="toggleText">Register</span></button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="hidden min-h-screen p-6">
        <!-- Header -->
        <div class="glass rounded-2xl p-6 mb-8 backdrop-blur-xl">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-[var(--accent)] to-[var(--accent-hover)] bg-clip-text">LinkHub Dashboard</h1>
                    <p class="text-[var(--text-secondary)] mt-1">Create & track short links with real-time analytics</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-sm text-[var(--text-secondary)]">Welcome back</p>
                        <p id="currentUser" class="font-semibold text-lg"></p>
                    </div>
                    <button id="logoutBtn" class="w-12 h-12 glass rounded-xl flex items-center justify-center hover:bg-[var(--accent)] hover:text-black transition-all">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass rounded-xl p-6 hover:scale-[1.02] transition-all">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-[var(--accent)]/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-link text-[var(--accent)] text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-2xl font-bold" id="totalLinks">0</p>
                        <p class="text-[var(--text-secondary)]">Total Links</p>
                    </div>
                </div>
            </div>
            <div class="glass rounded-xl p-6 hover:scale-[1.02] transition-all">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-eye text-green-400 text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-2xl font-bold" id="totalClicks">0</p>
                        <p class="text-[var(--text-secondary)]">Total Clicks</p>
                    </div>
                </div>
            </div>
            <div class="glass rounded-xl p-6 hover:scale-[1.02] transition-all">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-map-marker-alt text-blue-400 text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-2xl font-bold" id="uniqueIPs">0</p>
                        <p class="text-[var(--text-secondary)]">Unique IPs</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Link -->
        <div class="glass rounded-2xl p-8 mb-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-plus mr-3 text-[var(--accent)]"></i>Create Short Link</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2 text-[var(--text-secondary)]">Original URL</label>
                    <div class="relative">
                        <i class="fas fa-globe absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text-secondary)]"></i>
                        <input type="url" id="originalUrl" placeholder="https://example.com" class="w-full pl-12 pr-4 py-3 bg-[var(--bg-secondary)] border border-[var(--border)] rounded-xl focus:outline-none focus:ring-2 focus:ring-[var(--accent)] transition-all">
                    </div>
                </div>
                <div class="flex items-end space-x-3">
                    <button id="createLinkBtn" class="flex-1 btn-primary text-black font-bold py-3 px-6 rounded-xl uppercase tracking-wide text-sm">
                        <i class="fas fa-magic mr-2"></i>Shorten
                    </button>
                    <button id="randomLinkBtn" class="w-12 h-12 glass rounded-xl flex items-center justify-center hover:bg-[var(--accent)] hover:text-black transition-all">
                        <i class="fas fa-dice"></i>
                    </button>
                </div>
            </div>
            <div id="shortLinkResult" class="mt-4 p-4 glass rounded-xl hidden">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="font-mono text-lg" id="shortUrl"></p>
                        <p class="text-[var(--text-secondary)] text-sm mt-1">Click to copy</p>
                    </div>
                    <button id="copyShortUrl" class="btn-primary text-black px-4 py-2 rounded-lg font-medium">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Links Table -->
        <div class="glass rounded-2xl p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold flex items-center"><i class="fas fa-list mr-3 text-[var(--accent)]"></i>Your Links</h2>
                <div class="flex items-center space-x-2">
                    <input type="text" id="searchLinks" placeholder="Search links..." class="px-4 py-2 bg-[var(--bg-secondary)] border border-[var(--border)] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[var(--accent)] w-64">
                    <button id="refreshLinks" class="w-10 h-10 glass rounded-xl flex items-center justify-center hover:bg-[var(--accent)] hover:text-black transition-all">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table id="linksTable" class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-[var(--border)]">
                            <th class="text-left py-4 pr-6 font-medium">Short Link</th>
                            <th class="text-left py-4 px-6 font-medium hidden md:table-cell">Original URL</th>
                            <th class="text-left py-4 px-6 font-medium">Clicks</th>
                            <th class="text-left py-4 px-6 font-medium">Created</th>
                            <th class="text-right py-4 pl-6 font-medium">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Link Details Modal -->
    <div id="linkDetailsModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden">
        <div class="max-w-4xl w-full max-h-[90vh] overflow-y-auto m-8 p-8 glass rounded-3xl">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-bold bg-gradient-to-r from-[var(--accent)] to-[var(--accent-hover)] bg-clip-text">Link Analytics</h2>
                <button id="closeDetailsModal" class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-[var(--accent)] hover:text-black transition-all text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="linkDetailsContent"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
                                                                            </html>
